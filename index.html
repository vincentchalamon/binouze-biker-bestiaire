<script>
(function(){
  var svg=document.getElementById('cadran'), inner=document.getElementById('inner');
  var STEP=360/27, CX=500, CY=500;
  var rotation=11*STEP, startA=0, startRot=0, dragging=false;
  function angleAt(x,y){var r=svg.getBoundingClientRect();return Math.atan2(y-(r.top+r.height/2),x-(r.left+r.width/2))*180/Math.PI;}
  function apply(d){inner.setAttribute('transform','rotate('+d.toFixed(3)+' '+CX+' '+CY+')');}
  function down(e){dragging=true;var p=(e.touches?e.touches[0]:e);startA=angleAt(p.clientX,p.clientY);startRot=rotation;if(e.cancelable)e.preventDefault();}
  function move(e){if(!dragging)return;var p=(e.touches?e.touches[0]:e);var d=angleAt(p.clientX,p.clientY)-startA;if(d>180)d-=360;if(d<-180)d+=360;rotation=startRot+d;apply(rotation);if(e.cancelable)e.preventDefault();}
  function up(){if(!dragging)return;dragging=false;rotation=Math.round(rotation/STEP)*STEP;inner.style.transition='transform .14s ease-out';apply(rotation);setTimeout(function(){inner.style.transition='';},160);}
  svg.addEventListener('mousedown',down);window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
  svg.addEventListener('touchstart',down,{passive:false});svg.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('touchend',up);window.addEventListener('touchcancel',up);
  apply(rotation);
})();
